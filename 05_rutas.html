<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas</title>
</head>
<body>
    <h1>Explicación: Rutas Absolutas y Relativas</h1>
    <section>
        <h2>Ruta Absoluta</h2>
        <!--Ruta completa a un recurso en un servidor externo.La ruta absoluta es la URL completa del recurso, esta no se modifica según la ubicación del archivo actual-->
        <p> 
            Para ir a un sitio externo, como el catálogo global de repuestos, usamos la URL completa: <a href="https://www.shimano.com/en/>Visitarshimano Internacional</a>
        </p>
        <img src="https://www.dot-store.org/articles/a-smart-buyers-guide-to-web-hosting-savings.html?psystem=SN&domain=www.manualweb.com&oref=https%3A%2F%2Fwww.manualweb.com%2F">
    </section>
    <hr>
    <section>
        <h2>Ruta Relativa</h2>
        <!--Ruta relativa a un recurso dentro del mismo proyecto.La ruta relativa se basa en la ubicación del archivo actual, y se ajusta según la estructura de carpetas del proyecto-->
        <p>
           Ir a la pagina de <a href="04_inline.html">Inline vs Block</a>
           <!-- Funciona si hay un archivo llamado 04_inline.html en la misma carpeta -->
        </p>

        <p>


         Ver foto de tecnología<a href="">CSS 3</a>
         <!--Funciona si hay una imagen llamada "imagen_css.png" en la carpeta llamada "ing"-->
        </p>
    </section>
     
</body>
</html>
