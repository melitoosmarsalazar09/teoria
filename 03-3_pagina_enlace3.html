    <title>Enlaces</title>

<body>
    <!--Los enlances o anclas o hipervinculos-->
    <!--a (anchor)significa ancla.Metáfora:como en un barco te mantiene en una ubicación específica un ancla es justamente para que el usuario sepa hacía dónde buscar un recurso o hacia donde navegar en la pagina web->
    <!-- href (hyper reference) es la referencia a un recurso,el destino del enlace-->
     <!--Lo que esta dentro de la etiqueta aes el texto visible que el usuario verá en la pagina web.Mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace.-->

    <h2 title="Titulo de la página">Enlaces o anclas</h2>
    <a href="https://www.google.com.co/index.html">Google</a>
    <br>
    <a href="https://www.facebook.com/">Facebook</a>
    <br>
    <a href="https://www.youtube.com/">Youtube</a>"
    <br>
    <a title = "ir al canal de youtube" href="https://www.youtube.com/@ramcrack0584
    <br>
    <a href="http://127.0.0.1:5500/03-1_pagina_enlace1.html
    <br>
    <a href="http:http://127.0.0.1:5500/03-2_pagina_enlace2.html">Ir a enlace dos</a>
    <br>
    <a href="03-3_pagina_enlace3.html">Ir a enlace tres </a>
    <!--Es sumamente importante que en la programación y el desarrollo web se realicen las practicas a medida que se va avanzando, de esta forma se asegura que una mejor comprensión y aplicaión de los conceptos aprendidos.Entienden que la programación es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede cuando leen o ven algo que se está haciendo,sin embargo, la unica forma de aprender es probando ustedes mismos todo lo que se debe implementar.-->
    <br>

    <h2>Enlaces con target a otra ventana</h2>
    <a href="https://www.google.com" target="_blank">Ir a enlace cuatro en una nueva ventana</a>
<!--El atributo target="_blank" abre el enlace en una ventana o pestaña del navegador.Por defecto siempre esta en self que se abre en la mismas ventana-->
