<body>
    <!--Se tienen 6 tipos de encabezados, desde el h1 hasta el h6-->
    <!--(h6*6)Crea 6 Titulos en orden del 1 al 6 Ermmet-->

    <h1>Titulo</h1>
    <!-- El h1 se utiliza una sola vez en una página web esto es debido a su importancia en el CEO lo que es el posicionamiento web,es decir,google le da la mucha importancia al h1 -->
    <h2>subtitulo</h2>
    <h3>subtitulo</h3>
    <h4>subtitulo</h4>
    <h5>subtitulo</h5>
    <h6>subtitulo</h6>

    <!-- Desde el h2 hasta el h6, se utilizan las veces que sean necesarias según el contenido que se quiera recrear -->
     <!-- Párrafo:Los párrafos deben tener una idea o punto especifico.Cada párrafo debe tratar un solo tema o concepto,una idea.Es decir, puede describir o un elemento, hasta un mensaje en el chat. Por ejemplo en una sección de habla sobre los beneficios del ejercicio: Un párrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental.Finalmente,debe existir un motivo para que exista un párrafo-->
